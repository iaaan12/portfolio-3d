<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Ian Gianera — Portfolio RPG</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #091209;
      font-family: 'Press Start 2P', monospace;
    }

    #game-wrap {
      position: fixed;
      inset: 0;
      display: block;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
      touch-action: none;
    }

    @media(pointer:coarse) {

      html,
      body {
        cursor: auto;
      }
    }

    /* custom cursor */
    #cur {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      width: 16px;
      height: 16px;
      transform: translate(-8px, -8px);
    }

    @media(pointer:coarse) {
      #cur {
        display: none;
      }
    }

    /* HUD */
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      background: rgba(4, 10, 4, 0.96);
      border-bottom: 2px solid #2a5a2a;
    }

    .hud-name {
      font-size: .52rem;
      color: #88ff88;
      text-shadow: 0 0 10px #44ff44;
      white-space: nowrap;
    }

    #hud-hint {
      font-size: .34rem;
      color: #446644;
      animation: bk 1.6s step-end infinite;
      text-align: center;
    }

    @keyframes bk {
      50% {
        opacity: 0;
      }
    }

    #hud-clock {
      font-size: .48rem;
      color: #446644;
      white-space: nowrap;
    }

    @media(max-width:520px) {
      .hud-name {
        font-size: .32rem;
      }

      #hud-hint {
        display: none;
      }

      #hud-clock {
        font-size: .32rem;
      }
    }

    /* TOAST */
    #toast {
      position: fixed;
      top: 54px;
      left: 50%;
      transform: translateX(-50%) translateY(-120px);
      background: rgba(0, 14, 0, .98);
      border: 2px solid #ffcc00;
      color: #ffee88;
      padding: 10px 20px;
      font-size: .42rem;
      z-index: 400;
      transition: transform .25s steps(4);
      text-align: center;
      max-width: 90vw;
      box-shadow: 0 0 24px rgba(255, 200, 0, .4);
      line-height: 1.8;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* PROXIMITY BANNER */
    #prox {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 16, 0, .98);
      border: 2px solid #44ff44;
      padding: 9px 20px;
      font-size: .4rem;
      color: #88ff88;
      animation: bk .9s step-end infinite;
      display: none;
      z-index: 150;
      text-align: center;
      white-space: nowrap;
      box-shadow: 0 0 16px rgba(68, 255, 68, .5);
    }

    @media(max-width:520px) {
      #prox {
        bottom: 130px;
        font-size: .32rem;
        padding: 7px 14px;
      }
    }

    /* DIALOG */
    #dialog {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 300;
      background: #080f08;
      border-top: 3px solid #3a7a3a;
      transform: translateY(100%);
      transition: transform .18s steps(3);
      display: flex;
      flex-direction: column;
      max-height: 68vh;
    }

    #dialog.open {
      transform: translateY(0);
    }

    #dtop {
      background: #102010;
      padding: 8px 16px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a5a2a;
    }

    #dtitle {
      font-size: .48rem;
      color: #88ff88;
    }

    #dclose {
      background: none;
      border: 1px solid #3a7a3a;
      color: #88ff88;
      padding: 5px 14px;
      font-family: 'Press Start 2P', monospace;
      font-size: .42rem;
      cursor: pointer;
      min-height: 36px;
      min-width: 44px;
    }

    #dclose:hover,
    #dclose:active {
      background: #1a3a1a;
    }

    #dbody {
      padding: 14px 18px 20px;
      overflow-y: auto;
      flex: 1;
      color: #aaccaa;
      line-height: 1.8;
      -webkit-overflow-scrolling: touch;
    }

    #dbody::-webkit-scrollbar {
      width: 4px;
    }

    #dbody::-webkit-scrollbar-thumb {
      background: #2a5a2a;
    }

    .dh1 {
      font-size: .65rem;
      color: #88ff88;
      text-shadow: 0 0 8px #44ff44;
      margin-bottom: 14px;
    }

    .dh2 {
      font-size: .42rem;
      color: #66cc66;
      margin: 14px 0 8px;
    }

    .dp {
      font-family: monospace;
      font-size: .82rem;
      color: #aaccaa;
      margin-bottom: 8px;
      line-height: 1.7;
    }

    .dtag {
      display: inline-block;
      background: rgba(68, 255, 68, .1);
      border: 1px solid rgba(68, 255, 68, .3);
      color: #88ff88;
      padding: 1px 8px;
      margin: 2px;
      font-family: monospace;
      font-size: .76rem;
    }

    .dlink {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(68, 255, 68, .2);
      padding: 12px 14px;
      margin: 6px 0;
      color: #aaccaa;
      text-decoration: none;
      font-family: monospace;
      font-size: .8rem;
      min-height: 46px;
      transition: all .15s;
    }

    .dlink:hover,
    .dlink:active {
      border-color: #88ff88;
      color: #88ff88;
      background: rgba(68, 255, 68, .05);
    }

    .dcard {
      border: 1px solid rgba(68, 255, 68, .2);
      padding: 14px;
      margin: 8px 0;
    }

    .dcard:hover {
      border-color: rgba(68, 255, 68, .4);
    }

    .dtitle {
      font-size: .4rem;
      color: #55dd55;
      margin-bottom: 7px;
    }

    .sgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 4px;
    }

    .skgrid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .skbox {
      background: #060e06;
      border: 1px solid rgba(68, 255, 68, .18);
      padding: 12px;
    }

    .skbox h3 {
      font-size: .36rem;
      color: #66cc66;
      margin-bottom: 8px;
    }

    .skbox li {
      list-style: none;
      font-family: monospace;
      font-size: .76rem;
      padding: 2px 0;
      color: #88aa88;
    }

    .skbox li::before {
      content: '> ';
      color: #44aa44;
    }

    /* MOBILE JOYSTICK */
    #jpad {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 350;
    }

    #jbase {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: rgba(0, 20, 0, .72);
      border: 2px solid rgba(68, 255, 68, .45);
      position: relative;
      touch-action: none;
    }

    #jknob {
      position: absolute;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(68, 255, 68, .7);
      border: 2px solid #88ff88;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: 0 0 10px rgba(68, 255, 68, .5);
    }

    #ibtn {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 20px;
      z-index: 350;
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: rgba(0, 20, 0, .75);
      border: 2px solid rgba(68, 255, 68, .5);
      color: #88ff88;
      font-family: 'Press Start 2P', monospace;
      font-size: .36rem;
      text-align: center;
      padding: 0;
      line-height: 1.4;
      touch-action: none;
      cursor: pointer;
    }

    @media(pointer:coarse) {
      #jpad {
        display: block;
      }

      #ibtn {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }
    }

    /* INTRO */
    #intro {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: #050e05;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 24px;
    }

    .ititle {
      font-size: clamp(.6rem, 3.5vw, 1rem);
      color: #88ff88;
      text-shadow: 0 0 24px #44ff44;
      text-align: center;
      line-height: 2.4;
    }

    .isub {
      font-size: clamp(.28rem, 1.8vw, .4rem);
      color: #446644;
      text-align: center;
      line-height: 2.6;
    }

    .ibtn {
      margin-top: 10px;
      background: none;
      border: 2px solid #3a6a3a;
      color: #88ff88;
      padding: 14px 34px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(.38rem, 2vw, .52rem);
      cursor: pointer;
      min-height: 48px;
    }

    .ibtn:hover,
    .ibtn:active {
      background: #1a3a1a;
      border-color: #88ff88;
      box-shadow: 0 0 20px rgba(68, 255, 68, .3);
    }
  </style>
</head>

<body>

    <div class="hud-name">IAN GIANERA · DEV</div>

    <div class="ititle">★ IAN GIANERA ★<br>PORTFOLIO RPG</div>
    <div class="isub">
      Fullstack Developer · Argentina<br>
      ────────────────────<br>
      CLICK / TAP → mover personaje<br>
      Acercate a los lugares → interactuar<br>
      ¡Atención a la música y misiones! 🎧

  <script>
    console.log("%cDesarrollado con 💻 por Ian Gianera", "color: #88ff88; font-size: 14px; font-weight: bold;");
    console.log("%cEmail: iangianera2@gmail.com", "color: #aaccaa; font-size: 12px;");
    console.log(
      "%c¡Ey, Dev! 👀 Ya que tienes las DevTools abiertas, prueba ejecutar la función %ccheatCode()%c en la consola...",
      "color: #aaccaa; font-size: 14px;",
      "color: #ffcc00; font-family: monospace; font-size: 14px; background: #333; padding: 2px;",
      "color: #aaccaa; font-size: 14px;"
    );

    // FUNCIÓN OCULTA PARA MODO DIOS
    window.cheatCode = function () {
      char.speed = 10;
      itemsFound = 3;
      ITEMS.forEach(i => i.found = true);

      if (actx && actx.state === 'suspended') actx.resume();
      playBeep(800, 'square', 0.1, 0.4);
      setTimeout(() => playBeep(1200, 'square', 0.4, 0.4), 100);

      showToast("🔓 MODO DIOS ACTIVADO: Super velocidad y misiones completadas.");
      return "¡Disfruta el Modo Dios! Pásate por mi LinkedIn para decirme que lo encontraste.";
    };

    // ═══════════════════════════════════════════════════════
    //  AUDIO & MUSIC SYSTEM
    // ═══════════════════════════════════════════════════════
    let actx = null;
    let isGlobalMuted = new URLSearchParams(window.location.search).get('muted') === 'true';

    window.addEventListener('message', (e) => {
      if (e.data === 'mute') isGlobalMuted = true;
      if (e.data === 'unmute') isGlobalMuted = false;
    });

    function initAudio() {
      if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
      if (actx.state === 'suspended') actx.resume();
    }

    function playBeep(freq, type, dur, vol) {
      if (!actx || isGlobalMuted) return;
      const osc = actx.createOscillator();
      const gain = actx.createGain();
      osc.type = type; osc.frequency.setValueAtTime(freq, actx.currentTime);
      gain.gain.setValueAtTime(vol, actx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + dur);
      osc.connect(gain); gain.connect(actx.destination);
      osc.start(); osc.stop(actx.currentTime + dur);
    }

    function playStep() {
      if (!actx || isGlobalMuted) return;
      const buf = actx.createBuffer(1, actx.sampleRate * 0.05, actx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
      const src = actx.createBufferSource(); src.buffer = buf;
      const flt = actx.createBiquadFilter(); flt.type = 'lowpass'; flt.frequency.value = 600;
      const gain = actx.createGain(); gain.gain.value = 0.3;
      src.connect(flt); flt.connect(gain); gain.connect(actx.destination);
      src.start();
    }

    // Generative Ambient Music
    const ambientNotes = [110.00, 130.81, 164.81, 196.00, 220.00, 261.63, 329.63, 392.00];
    function ambientLoop() {
      if (!gameRunning || !actx) return;
      
      if (!isGlobalMuted) {
        const note = ambientNotes[Math.floor(Math.random() * ambientNotes.length)];
        const osc = actx.createOscillator();
        const gain = actx.createGain();
        osc.type = 'sine';
        osc.frequency.value = note;
        gain.gain.setValueAtTime(0, actx.currentTime);
        gain.gain.linearRampToValueAtTime(0.04, actx.currentTime + 2);
        gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 6);
        osc.connect(gain); gain.connect(actx.destination);
        osc.start(); osc.stop(actx.currentTime + 6);
      }

      setTimeout(ambientLoop, 1500 + Math.random() * 2000);
    }
    function startMusic() {
      ambientLoop();
      setTimeout(ambientLoop, 1000);
    }

    // ═══════════════════════════════════════════════════════
    //  CONFIG
    // ═══════════════════════════════════════════════════════
    const T = 32, COLS = 40, ROWS = 30, W = COLS * T, H = ROWS * T;

    const C = {

      w1: '#1a3a5c', w2: '#1e4470',
      trunk: '#5a3a1a', lv1: '#1e6b1e', lv2: '#267326', lv3: '#1a5c1a',
      sk: '#e8b88a', hair: '#2a1400', shirt: '#2255cc', pants: '#1a2a5a', shoes: '#111',
    };

    // ═══════════════════════════════════════════════════════
    //  MAP
    // ═══════════════════════════════════════════════════════
    const MAP = [];
    for (let r = 0; r < ROWS; r++) {
      MAP.push(new Array(COLS).fill(0));
    }
    function fillRect(r1, c1, r2, c2, v) { for (let r = r1; r <= r2; r++)for (let c = c1; c <= c2; c++)MAP[r][c] = v; }

    // roads & paths
    fillRect(14, 0, 16, 39, 1); fillRect(0, 19, 29, 21, 1);
    fillRect(22, 10, 22, 19, 1); fillRect(22, 21, 22, 30, 1);
    fillRect(8, 14, 13, 16, 1); fillRect(8, 22, 13, 24, 1);
    fillRect(23, 10, 26, 12, 1); fillRect(23, 26, 26, 28, 1);
    // plaza path (quest board)
    fillRect(9, 29, 13, 33, 1);
    // water corners
    fillRect(0, 0, 6, 5, 2); fillRect(0, 33, 6, 39, 2); fillRect(23, 33, 29, 39, 2);
    // trees
    [[1, 7], [1, 8], [2, 7], [1, 10], [2, 11], [3, 9], [1, 26], [2, 27], [1, 28], [3, 26],
    [7, 0], [8, 1], [9, 0], [10, 2], [7, 37], [8, 38], [9, 37],
    [25, 15], [26, 14], [27, 15], [26, 16], [25, 23], [26, 24], [27, 23],
    [28, 5], [27, 6], [28, 7], [0, 15], [0, 16], [0, 17], [0, 18], [0, 22], [0, 23], [0, 24],
    [18, 0], [19, 1], [20, 0], [18, 38], [19, 37], [20, 38], [21, 39],
    [10, 30], [11, 31], [12, 30], [10, 32], [10, 6], [11, 7], [12, 6],
    ].forEach(([r, c]) => { if (r < ROWS && c < COLS) MAP[r][c] = 3; });
    // buildings
    fillRect(5, 13, 12, 18, 4); fillRect(5, 21, 12, 27, 4);
    fillRect(23, 9, 26, 13, 4); fillRect(23, 25, 27, 29, 4);

    // ═══════════════════════════════════════════════════════
    //  DATA: POIS, EGGS, ITEMS, NPCS
    // ═══════════════════════════════════════════════════════
    const POIS = [
      { id: 'house', name: '🏠 SOBRE MÍ', doorX: 15.5 * T, doorY: 13 * T, r: T * 2.5, col: '#ff8844' },

      { id: 'chest', name: '📦 SKILLS', doorX: 11 * T, doorY: 26.5 * T, r: T * 2.5, col: '#ffcc00' },
      { id: 'portal', name: '✨ CONTACTO', doorX: 27 * T, doorY: 27.5 * T, r: T * 2.5, col: '#bb44ff' },
      { id: 'quests', name: '📜 MISIONES', doorX: 31.5 * T, doorY: 11 * T, r: T * 2.0, col: '#ffaa00' }
    ];

    const EGGS = [
      { tx: 2, ty: 3, r: T * 2, found: false, msg: '🦆 ¡Encontraste el pato! "Quack quack... nice React skills"' },
      { tx: 29, ty: 27, r: T * 2, found: false, msg: '🪦 "Aquí yace el IE6. Nadie lo extraña." — Ian, 2024' },
      { tx: 3, ty: 10, r: T * 1.8, found: false, msg: '🐱 El gato dice: "Deploy a prod un viernes? Qué valiente."' },
      { tx: 35, ty: 20, r: T * 1.8, found: false, msg: '🪙 ¡Moneda de oro! +500 XP de JavaScript desbloqueados' },
      { tx: 5, ty: 26, r: T * 2, found: false, msg: '📜 Nota secreta: "Si llegaste acá, escribime 👋 — Ian"' },

    const ITEMS = [
      { id: 'keyboard', name: '⌨️ Teclado Mecánico', x: 2 * T + 16, y: 15 * T + 16, found: false },
      { id: 'radio', name: '📻 Baofeng BF-888s', x: 38 * T + 16, y: 15 * T + 16, found: false },
      { id: 'book', name: '📘 Libro de Cálculo', x: 20 * T + 16, y: 5 * T + 16, found: false }
    ];
    let itemsFound = 0;

    const NPCS = [
      { id: 'npc1', x: 8 * T + 16, y: 15 * T + 8, startX: 8 * T + 16, startY: 15 * T + 8, col: '#cc4444', dir: 'down', timer: 0, state: 'idle', msg: '¡Qué lindo día para codear!' },
      { id: 'npc2', x: 30 * T + 8, y: 14 * T + 16, startX: 30 * T + 8, startY: 14 * T + 16, col: '#44aacc', dir: 'left', timer: 0, state: 'idle', msg: 'Ayer encontré un bug rarísimo...' },
      { id: 'npc3', x: 20 * T + 4, y: 24 * T + 12, startX: 20 * T + 4, startY: 24 * T + 12, col: '#44cc88', dir: 'right', timer: 0, state: 'idle', msg: 'Me encanta este lugar.' }
    ];

    // ═══════════════════════════════════════════════════════
    //  DIALOG CONTENT
    // ═══════════════════════════════════════════════════════
    const DIALOGS = {
      house: {
        title: '🏠 SOBRE MÍ', html: `
<div class="dh1">// hola, soy Ian</div>
<p class="dp">Desarrollador <strong style="color:#88ff88">fullstack</strong> con base en Salta, Argentina. Construyo productos digitales que combinan buen código con buen diseño.</p>

<p class="dp">Desde sistemas de facturación hasta e-commerce y landing pages de Shopify.</p>
<div class="dh2">// stack</div>
<p class="dp">React · JavaScript ES6+ · Vite · SQL · MercadoPago · ARCA · Netlify · Shopify</p>`},
      shop: {
        title: '🏪 PROYECTOS', html: `
<div class="dh1">// lo que construí</div>
<div class="dcard"><div class="dtitle">▶ FACTURAS ARG</div>
<p class="dp">Sistema de facturación con Mercado Pago, base de datos de clientes, validación ARCA y acceso por roles.</p>
<div style="margin-bottom:10px"><span class="dtag">React</span><span class="dtag">JS ES6+</span><span class="dtag">Vite</span><span class="dtag">MercadoPago</span><span class="dtag">ARCA</span><span class="dtag">Netlify</span></div>
<a href="https://facturasarg.netlify.app/" target="_blank" class="dlink">🧾 facturasarg.netlify.app →</a></div>
<div class="dcard"><div class="dtitle" style="color:#88aaff">▶ LUMIÈRE — FASHION BOUTIQUE</div>

      ctx.strokeStyle = '#44ff44'; ctx.lineWidth = 1; ctx.strokeRect(x - tw / 2 - 8, y - 52, tw + 16, 13);
      ctx.fillStyle = '#88ff88'; ctx.fillText('IAN', x, y - 43);
    }

    function drawClickTarget() {
      if (!clickTarget) return;
      const age = Date.now() - clickTarget.t;
      if (age > 700) { clickTarget = null; return; }
      const a = 1 - age / 700, s = 8 + age / 40;
      ctx.strokeStyle = `rgba(136,255,136,${a})`; ctx.lineWidth = 1.5;
      ctx.strokeRect(clickTarget.x - s / 2, clickTarget.y - s / 2, s, s);
    }

    function drawLight(x, y, r) {
      const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
      grad.addColorStop(0, 'rgba(255, 220, 100, 0.4)');
      grad.addColorStop(1, 'rgba(255, 220, 100, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    }

    // ═══════════════════════════════════════════════════════
    //  MAIN DRAW
    // ═══════════════════════════════════════════════════════
    function draw() {
      ctx.fillStyle = '#091209'; ctx.fillRect(0, 0, canvas.width, canvas.height); // Outer void
      ctx.save();
      ctx.translate(-Math.round(viewX), -Math.round(viewY));

      const sc = Math.max(0, Math.floor(viewX / T) - 1), ec = Math.min(COLS, sc + Math.ceil(canvas.width / T) + 2);
      const sr = Math.max(0, Math.floor(viewY / T) - 1), er = Math.min(ROWS, sr + Math.ceil(canvas.height / T) + 2);

      for (let r = sr; r < er; r++)for (let c = sc; c < ec; c++) drawTile(c, r);

      if (char.path.length > 0) {
        ctx.strokeStyle = 'rgba(136,255,136,.22)'; ctx.lineWidth = 2; ctx.setLineDash([4, 4]);
        ctx.beginPath(); ctx.moveTo(char.x, char.y);
        for (const p of char.path) ctx.lineTo(p.x, p.y);
        ctx.stroke(); ctx.setLineDash([]);
      }

      drawQuestBoard(); drawHouse(); drawShop(); drawChest(); drawPortal();
      for (let r = sr; r < er; r++)for (let c = sc; c < ec; c++) if (MAP[r][c] === 3) drawTree(c, r);

      drawItems();
      drawEggs();

      for (let n of NPCS) drawNPC(n);

      // proximity ring
      for (const p of POIS) {
        if (nearPOI && nearPOI.id === p.id) {
          const t2 = Date.now() * .004, r2 = 22 + Math.sin(t2) * 5;
          ctx.strokeStyle = p.col; ctx.lineWidth = 2; ctx.globalAlpha = .5 + Math.sin(t2) * .3;
          ctx.beginPath(); ctx.arc(p.doorX, p.doorY - 8, r2, 0, Math.PI * 2); ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }

      drawChar();
      drawClickTarget();

      // --- DAY/NIGHT CYCLE ---
      const h = new Date().getHours();
      let nightAlpha = 0;
      if (h >= 19 || h <= 6) nightAlpha = 0.65; // Night
      else if (h >= 17 || h <= 7) nightAlpha = 0.3; // Sunset/Sunrise

      if (nightAlpha > 0) {
        ctx.restore(); // reset transform to draw over whole screen
        ctx.fillStyle = `rgba(5, 10, 20, ${nightAlpha})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw lights (re-translate)
        ctx.save(); ctx.translate(-Math.round(viewX), -Math.round(viewY));
        ctx.globalCompositeOperation = 'screen';
        drawLight(16 * T, 11 * T, 140); // House light
        drawLight(24 * T, 11 * T, 120); // Shop light
        drawLight(31 * T + 16, 11 * T, 90); // Quest board light
        drawLight(27 * T + 16, 25 * T + 16, 100); // Portal light
        ctx.globalCompositeOperation = 'source-over';
      }

      ctx.restore();
    }

    function loop(ts) {
      if (gameRunning) { const dt = Math.min(ts - lastTime, 50); lastTime = ts; update(dt); draw(); }
      requestAnimationFrame(loop);
    }

    // ═══════════════════════════════════════════════════════
    //  DIALOG
    // ═══════════════════════════════════════════════════════
    function openDialog(id) {
      playBeep(800, 'sine', 0.1, 0.2);
      let d = DIALOGS[id];

      if (!d) {
        if (id === 'quests') {
          let listItems = ITEMS.map(i => `<li>[${i.found ? 'X' : ' '}] ${i.name}</li>`).join('');
          d = {
            title: '📜 TABLÓN DE MISIONES',
            html: `
          <div class="dh1">// objetivos</div>
          <p class="dp">Encuentra estos objetos perdidos por el mapa:</p>
          <div class="dcard">
            <div class="dtitle">▶ BÚSQUEDA</div>
            <ul class="dp" style="list-style:none; padding:0; line-height:2; color:${itemsFound === 3 ? '#88ff88' : '#aaccaa'};">
              ${listItems}
            </ul>
          </div>
          ${itemsFound === 3 ? '<p class="dp" style="color:#ffcc00; text-align:center; margin-top:10px;">¡Completaste todo! 🏆</p>' : ''}
        `
          };
        } else {
          return;
        }
      }

      document.getElementById('dtitle').textContent = d.title;
      document.getElementById('dbody').innerHTML = d.html;
      document.getElementById('dialog').classList.add('open');

      // Ocultar controles móviles detrás del modal
      document.getElementById('jpad').style.opacity = '0';
      document.getElementById('jpad').style.pointerEvents = 'none';
      const ibtn = document.getElementById('ibtn');
      if (ibtn) {
        ibtn.style.opacity = '0';
        ibtn.style.pointerEvents = 'none';
      }
    }

    function closeDialog() {
      document.getElementById('dialog').classList.remove('open');
      if (nearPOI) closedPOI = nearPOI.id;

      // Restaurar controles móviles
      document.getElementById('jpad').style.opacity = '1';
      document.getElementById('jpad').style.pointerEvents = 'auto';
      const ibtn = document.getElementById('ibtn');
      if (ibtn) {
        ibtn.style.opacity = '1';
        ibtn.style.pointerEvents = 'auto';
      }
    }
    function checkInteract() { if (nearPOI) openDialog(nearPOI.id); }
    window.closeDialog = closeDialog;

    // ═══════════════════════════════════════════════════════
    //  START
    // ═══════════════════════════════════════════════════════
    function startGame() {
      initAudio();
      startMusic(); // Inicia la música generativa
      document.getElementById('intro').style.display = 'none';
      gameRunning = true; viewX = char.x - canvas.width / 2; viewY = char.y - canvas.height / 2;
    }
    window.startGame = startGame;

    const curEl = document.getElementById('cur');
    document.addEventListener('mousemove', e => { curEl.style.left = e.clientX + 'px'; curEl.style.top = e.clientY + 'px'; });

    function tick() { const n = new Date(); document.getElementById('hud-clock').textContent = [n.getHours(), n.getMinutes()].map(v => String(v).padStart(2, '0')).join(':'); }
    setInterval(tick, 1000); tick();

    requestAnimationFrame(loop);
  </script>

</body>
